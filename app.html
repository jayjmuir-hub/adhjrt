<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ADH JRT — Match Day</title>
<meta name="description" content="Fixtures, live scores and standings for the Abu Dhabi Harlequins Junior Rugby Tournament, 7-8 November 2026.">

<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0C0C0E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ADH JRT">
<link rel="icon" href="/assets/icon-192.png">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ============================================================
   ADH JRT — Match Day app
   Same shell as the club "Club Hub" prototype (bottom tabs on
   phones, top nav on desktop, bottom sheets) but on the
   tournament palette and driven by the live JRT backend rather
   than seeded sample data.
   ============================================================ */
:root{
  /* JRT palette — Akuma kit, matching adhjrt.com */
  --red:#E11B22; --red-deep:#A81219; --green:#17A34A; --green-deep:#0F7A36;
  --ink:#0C0C0E; --paper:#F3F1ED; --card:#ffffff; --line:#e2ded4;
  --muted:#77726e; --text:#14151A;
  --good:#17A34A; --good-bg:#e8f6ec; --warn:#c9861a; --warn-bg:#fbf1dd;
  --shadow:0 6px 24px rgba(12,12,14,.10); --shadow-sm:0 2px 8px rgba(12,12,14,.08);
  --radius:16px; --radius-sm:11px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',system-ui,sans-serif;background:var(--paper);color:var(--text);
     -webkit-font-smoothing:antialiased;overflow-x:hidden}
button,input,select{font-family:inherit;font-size:inherit}
button{border:none;background:none;cursor:pointer;color:inherit}
a{color:inherit}

/* ---------- app frame ---------- */
.app{max-width:900px;margin:0 auto;min-height:100vh;
     padding-bottom:calc(env(safe-area-inset-bottom) + 84px)}
@media(min-width:820px){ .app{padding-bottom:40px} }

header.top{position:sticky;top:0;z-index:40;background:var(--ink);color:#fff;
           padding-top:env(safe-area-inset-top)}
.top-line{height:4px;background:linear-gradient(90deg,var(--red),var(--red) 45%,var(--green))}
.top-in{display:flex;align-items:center;gap:12px;padding:12px 16px}
.brand{display:flex;align-items:center;gap:12px;text-align:left;padding:0;color:inherit}
.brand:active{opacity:.7}
.top-t,.top-s{display:block}
.crest{width:38px;height:38px;border-radius:9px;background:#fff;padding:3px;flex:none}
.crest img{width:100%;height:100%;object-fit:contain;display:block}
.top-t{font-family:'Anton';font-size:18px;letter-spacing:.5px;line-height:1}
.top-s{font-size:10px;letter-spacing:2px;color:#3bd070;font-weight:700;margin-top:3px}
.who{margin-left:auto;display:flex;align-items:center;gap:8px}
.badge{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
       padding:5px 10px;border-radius:100px;white-space:nowrap}
.badge-pub{background:rgba(255,255,255,.13);color:#cdd2da}
.badge-mgr{background:var(--green);color:#fff}
.badge-org{background:var(--red);color:#fff}
.sitelink{display:flex;align-items:center;gap:5px;padding:6px 11px 6px 9px;border-radius:100px;
          border:1px solid rgba(255,255,255,.22);color:#cdd2da;font-size:11px;font-weight:700;
          letter-spacing:.6px;text-transform:uppercase;text-decoration:none;white-space:nowrap}
.sitelink svg{width:14px;height:14px;flex:none}
.sitelink:active{background:rgba(255,255,255,.1)}
@media(max-width:400px){ .sitelink span{display:none} .sitelink{padding:7px} }

/* desktop nav */
.nav-desktop{display:none;gap:4px;padding:0 12px 10px}
.nav-desktop button{padding:9px 16px;border-radius:100px;font-weight:700;font-size:14px;color:#aeb4bf}
.nav-desktop button.on{background:rgba(255,255,255,.12);color:#fff}
@media(min-width:820px){ .nav-desktop{display:flex} .tabbar{display:none!important} }

main{padding:16px}

/* ---------- bottom tabs ---------- */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:45;background:rgba(255,255,255,.95);
        backdrop-filter:blur(12px);border-top:1px solid var(--line);display:grid;
        grid-template-columns:repeat(4,1fr);padding:6px 4px calc(env(safe-area-inset-bottom) + 6px);
        max-width:900px;margin:0 auto}
.tabbar button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;
               font-size:10px;font-weight:700;letter-spacing:.3px;color:var(--muted)}
.tabbar button svg{width:22px;height:22px}
.tabbar button.on{color:var(--red)}

/* ---------- building blocks ---------- */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);
      border:1px solid var(--line);overflow:hidden}
.sec-t{font-family:'Anton';font-size:19px;text-transform:uppercase;letter-spacing:.4px;
       margin:22px 2px 10px;color:var(--ink)}
.sec-t:first-child{margin-top:4px}
.muted{color:var(--muted)}
.hero{background:linear-gradient(135deg,var(--ink),#1d1d22);color:#fff;border-radius:var(--radius);
      padding:20px;position:relative;overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px}
.hero::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;
              background:linear-gradient(90deg,var(--red),var(--red) 45%,var(--green))}
.hero-k{font-size:11px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:#3bd070}
.hero-h{font-family:'Anton';font-size:30px;line-height:1.04;text-transform:uppercase;margin-top:8px}
.hero-p{color:#aeb4bf;font-size:14px;margin-top:8px;line-height:1.55}

.cd{display:flex;gap:8px;margin-top:16px}
.cd div{flex:1;background:rgba(255,255,255,.08);border-radius:11px;padding:9px 4px;text-align:center}
.cd b{display:block;font-family:'Anton';font-size:22px;line-height:1}
.cd span{font-size:9px;letter-spacing:1.2px;color:#8b93a3;font-weight:700}

.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:6px}
@media(min-width:560px){ .tiles{grid-template-columns:repeat(4,1fr)} }
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);
      padding:13px;box-shadow:var(--shadow-sm)}
.tile b{display:block;font-family:'Anton';font-size:26px;color:var(--ink);line-height:1}
.tile span{font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;
           color:var(--muted);margin-top:5px;display:block}

.pill-row{display:flex;gap:7px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none}
.pill-row::-webkit-scrollbar{display:none}
.pill{flex:none;padding:8px 14px;border-radius:100px;font-weight:700;font-size:13px;
      border:1.5px solid var(--line);background:#fff;color:var(--muted);white-space:nowrap}
.pill.on{background:var(--red);border-color:var(--red);color:#fff}

/* match rows */
.mrow{display:grid;grid-template-columns:58px 1fr auto;gap:10px;align-items:center;
      padding:13px 14px;border-top:1px solid var(--line);width:100%;text-align:left}
.mrow:first-child{border-top:none}
.mtime{font-weight:800;color:var(--red);font-size:13px}
.mpitch{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.mteams{font-weight:600;font-size:14.5px;line-height:1.4}
.mmeta{font-size:11px;color:var(--muted);margin-top:3px}
.mscore{font-family:'Anton';font-size:19px;color:var(--ink);white-space:nowrap}
.chev{color:#c6c2bc}

.empty{padding:34px 22px;text-align:center;color:var(--muted)}
.empty b{display:block;font-family:'Anton';font-size:22px;color:var(--ink);
         text-transform:uppercase;margin-bottom:8px}
.cs-pill{display:inline-block;background:linear-gradient(90deg,var(--red),var(--green));color:#fff;
         font-weight:800;font-size:11px;letter-spacing:1px;padding:6px 15px;border-radius:100px;
         text-transform:uppercase;margin-bottom:14px}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:10px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);
   font-weight:800;padding:10px 6px;text-align:center;background:#faf9f7}
th:nth-child(2){text-align:left}
td{padding:11px 6px;text-align:center;border-top:1px solid var(--line)}
td:nth-child(2){text-align:left;font-weight:600}
tr.q td:first-child{box-shadow:inset 3px 0 0 var(--green)}
.pts{font-family:'Anton';font-size:16px}
.legend{padding:10px 14px;font-size:11px;color:var(--muted);border-top:1px solid var(--line);line-height:1.6}

/* forms + sheet */
.sheet-scrim{position:fixed;inset:0;background:rgba(12,12,14,.5);z-index:60;opacity:0;
             pointer-events:none;transition:opacity .25s}
.sheet-scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:#fff;
       border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;transform:translateY(100%);
       transition:transform .28s cubic-bezier(.32,.72,0,1);
       padding-bottom:calc(env(safe-area-inset-bottom) + 18px);max-width:900px;margin:0 auto}
.sheet.on{transform:translateY(0)}
.grip{width:38px;height:4px;background:var(--line);border-radius:4px;margin:9px auto 4px}
.sheet-head{display:flex;align-items:center;gap:12px;padding:8px 18px 12px;
            border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2}
.sheet-head h3{font-family:'Anton';font-size:20px;text-transform:uppercase;flex:1}
.x{width:32px;height:32px;border-radius:50%;background:var(--paper);display:grid;place-items:center}
.x svg{width:17px;height:17px}
.sheet-body{padding:18px}

label{display:block;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
      color:var(--muted);margin-bottom:6px}
input,select{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:10px;
             background:#fff;color:var(--text);font-size:16px}
input:focus,select:focus{outline:none;border-color:var(--red)}
.field{margin-bottom:15px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{width:100%;padding:14px;border-radius:11px;font-weight:800;font-size:15px;
     text-transform:uppercase;letter-spacing:.5px;text-align:center;display:block}
.btn-p{background:var(--red);color:#fff}
.btn-g{background:var(--green);color:#fff}
.btn-o{background:#fff;border:1.5px solid var(--line);color:var(--text)}
.err{background:#fbeae8;color:#a3271b;padding:11px 13px;border-radius:10px;font-size:13.5px;
     font-weight:600;margin-bottom:14px}
.ok{background:var(--good-bg);color:var(--green-deep);padding:11px 13px;border-radius:10px;
    font-size:13.5px;font-weight:600;margin-bottom:14px}
.note{background:var(--warn-bg);color:#8a5c10;padding:11px 13px;border-radius:10px;
      font-size:13px;font-weight:600;margin-bottom:14px;line-height:1.5}

.row{display:flex;align-items:center;gap:12px;padding:15px 16px;border-top:1px solid var(--line);
     width:100%;text-align:left}
.row:first-child{border-top:none}
.row b{font-weight:700;font-size:14.5px}
.row small{display:block;color:var(--muted);font-size:12.5px;margin-top:2px}
.row .chev{margin-left:auto}

.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(120px);
       bottom:calc(env(safe-area-inset-bottom) + 96px);background:var(--ink);color:#fff;
       padding:12px 20px;border-radius:100px;font-weight:600;font-size:14px;z-index:80;
       transition:transform .3s;box-shadow:var(--shadow);max-width:88vw;text-align:center}
.toast.on{transform:translateX(-50%) translateY(0)}
.spin{padding:40px;text-align:center;color:var(--muted);font-size:14px}
/* team card + chips */
.tcard{background:var(--ink);color:#fff;border-radius:var(--radius);padding:18px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.tcard::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--red),var(--red) 45%,var(--green))}
.tcard-k{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#3bd070}
.tcard-n{font-family:'Anton';font-size:26px;line-height:1.06;text-transform:uppercase;margin-top:7px}
.tcard-m{color:#aeb4bf;font-size:13.5px;margin-top:6px;line-height:1.5}
.tcard-cta{position:absolute;top:16px;right:16px;font-size:11px;font-weight:800;letter-spacing:.6px;
           text-transform:uppercase;color:#cdd2da;border:1px solid rgba(255,255,255,.25);
           padding:6px 12px;border-radius:100px}
.kick{display:flex;gap:8px;margin-top:14px}
.kick div{flex:1;background:rgba(255,255,255,.08);border-radius:10px;padding:9px 4px;text-align:center}
.kick b{display:block;font-family:'Anton';font-size:20px;line-height:1}
.kick span{font-size:9px;letter-spacing:1.1px;color:#8b93a3;font-weight:700}
.chip{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;
      padding:4px 9px;border-radius:100px;margin-left:7px;vertical-align:2px}
.chip-live{background:var(--red);color:#fff}
.chip-next{background:var(--green);color:#fff}
.mine{background:#fffdf4}
.mine .mteams{font-weight:800}
.pool-h{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
        padding:12px 14px 6px;background:#faf9f7;border-top:1px solid var(--line)}
tr.me td{background:#fffdf4;font-weight:800}
.seg{display:flex;gap:6px;margin-bottom:12px}
.seg button{flex:1;padding:9px;border-radius:9px;font-weight:700;font-size:13px;
            border:1.5px solid var(--line);background:#fff;color:var(--muted)}
.seg button.on{background:var(--ink);border-color:var(--ink);color:#fff}

</style>
</head>
<body>

<div class="app">
  <header class="top">
    <div class="top-line"></div>
    <div class="top-in">
      <!-- Tapping the crest returns to Today, the app's home screen — the
           convention people already expect from a logo in an app header. -->
      <button class="brand" id="goHome" aria-label="Back to Today">
        <span class="crest"><img src="/assets/crest.jpeg" alt=""></span>
        <span>
          <span class="top-t">ADH JRT</span>
          <span class="top-s">MATCH DAY</span>
        </span>
      </button>
      <div class="who">
        <span class="badge badge-pub" id="roleBadge">Viewing</span>
        <a class="sitelink" href="/" aria-label="Tournament website" title="Tournament website">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3.6 9h16.8M3.6 15h16.8M12 3a15 15 0 0 1 0 18a15 15 0 0 1 0-18"/></svg>
          <span>Site</span>
        </a>
      </div>
    </div>
    <nav class="nav-desktop" id="navDesktop"></nav>
  </header>

  <main id="main"><div class="spin">Loading…</div></main>

  <nav class="tabbar" id="tabbar"></nav>
</div>

<div class="sheet-scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="grip"></div>
  <div class="sheet-head"><h3 id="sheetTitle">—</h3>
    <button class="x" id="sheetClose" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
"use strict";

/* The app is a thin shell over the same data layer the website uses, so
   scores, standings, publishing and permissions behave identically — there is
   no second source of truth to keep in step. */
const api = await import('/scores-data.js');
/* Managers and organisers authenticate against different endpoints and store
   their sessions under different keys — see signIn(). */
const orgApi = await import('/organizer-data.js');

/* ---------------- tournament facts ----------------
   Which day an age group plays is fixed and published on the website. Knowing
   it lets a fixture's kick-off minutes become a real date, which is what makes
   "kick-off in 24 minutes" possible rather than just showing "09:20". */
const DAY1 = '2026-11-07', DAY2 = '2026-11-08';
const SATURDAY = ['u6','u7','u8','u9','u10','u11','u12','u12g'];
const dayOf = (agId) => SATURDAY.includes(agId) ? DAY1 : DAY2;

const KICKOFF = new Date(DAY1 + 'T08:00:00+04:00');
const END     = new Date(DAY2 + 'T20:00:00+04:00');
const FOLLOW_KEY = 'adhjrt_follow_v2';   // { ageId, team }

const ICON = {
  today:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18M8 3v4M16 3v4"/><rect x="3" y="5" width="18" height="16" rx="2"/></svg>',
  fixtures:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="9"/></svg>',
  tables:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>',
  more:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="6" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="18" r="1.6"/></svg>',
  chev:'<svg class="chev" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>',
};

const TABS = [
  { id:'today', label:'Today' }, { id:'fixtures', label:'Fixtures' },
  { id:'tables', label:'Tables' }, { id:'more', label:'More' },
];

/* ---------------- state ---------------- */
const S = {
  view:'today', session:null, ageGroups:[],
  ageId:null, team:null,        // what you follow
  browseId:null,                // what Fixtures/Tables are showing
  fixtures:null, standings:null,
  onlyMine:true,                // Fixtures filter when a team is followed
};

/* ---------------- helpers ---------------- */
const $ = (id) => document.getElementById(id);
const esc = (v) => String(v == null ? '' : v)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('on');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('on'), 2600);
}

const isOrganiser = (s) => !!(s && (s.isOrganizer || s._role === 'organizer' || s.role === 'organizer'));

/* Someone can hold BOTH a manager and an organiser account. currentSession()
   returns the manager one first, which would quietly demote an organiser to a
   single age group. Prefer the broader role. */
function resolveSession(){
  const s = api.currentSession();
  if (isOrganiser(s)) return s;
  try {
    const raw = localStorage.getItem('adhjrt_organizer_session');
    const o = raw ? JSON.parse(raw) : null;
    if (o && o.token) return { token:o.token, username:o.username, name:o.name, ageGroupId:'*', isOrganizer:true };
  } catch(e){}
  return s;
}

const canScore = (s, agId) =>
  !s ? false : (isOrganiser(s) || s.ageGroupId === '*' || s.ageGroupId === agId);
const ageName = (id) => (S.ageGroups.find(a => a.id === id) || {}).name || id;

function phase(){
  const n = Date.now();
  return n < KICKOFF.getTime() ? 'before' : n <= END.getTime() ? 'during' : 'after';
}

/* A fixture's real kick-off moment, from its minutes-past-midnight and the day
   its age group plays. */
function kickoffAt(m, agId){
  if (m.startMins == null) return null;
  const h = String(Math.floor(m.startMins/60)).padStart(2,'0');
  const mi = String(m.startMins%60).padStart(2,'0');
  return new Date(`${dayOf(agId)}T${h}:${mi}:00+04:00`);
}
function untilText(dt){
  if (!dt) return '';
  const diff = dt.getTime() - Date.now();
  if (diff < -75*60*1000) return '';
  if (diff < 0) return 'Under way';
  const mins = Math.round(diff/60000);
  if (mins < 60) return `Kick-off in ${mins} min`;
  const hrs = Math.floor(mins/60);
  if (hrs < 24) return `Kick-off in ${hrs}h ${mins%60}m`;
  return dt.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
}

/* ---------------- follow ---------------- */
function loadFollow(){
  try {
    const f = JSON.parse(localStorage.getItem(FOLLOW_KEY));
    if (f && f.ageId) { S.ageId = f.ageId; S.team = f.team || null; }
  } catch(e){}
}
function saveFollow(){
  try { localStorage.setItem(FOLLOW_KEY, JSON.stringify({ ageId:S.ageId, team:S.team })); } catch(e){}
}

/* Teams only exist once a draw is published, so this can come back empty and
   the UI has to cope rather than showing an empty chooser. */
function teamsInAge(){
  const st = S.standings;
  if (!st || st.awaitingPublication) return [];
  const out = new Set();
  (st.pools || []).forEach(p => (p.teams || []).forEach(t => out.add(t)));
  return [...out].sort();
}
const isMine = (m) => !!(S.team && (m.home === S.team || m.away === S.team));

/* ---------------- chrome ---------------- */
function paintRole(){
  const b = $('roleBadge');
  if (isOrganiser(S.session)) { b.className='badge badge-org'; b.textContent='Organiser'; }
  else if (S.session) { b.className='badge badge-mgr';
    b.textContent = S.session.ageGroupId === '*' ? 'Admin' : ageName(S.session.ageGroupId); }
  else { b.className='badge badge-pub'; b.textContent='Viewing'; }
}
function buildNav(){
  $('tabbar').innerHTML = TABS.map(t =>
    `<button data-go="${t.id}" class="${S.view===t.id?'on':''}">${ICON[t.id]}<span>${t.label}</span></button>`).join('');
  $('navDesktop').innerHTML = TABS.map(t =>
    `<button data-go="${t.id}" class="${S.view===t.id?'on':''}">${t.label}</button>`).join('');
  document.querySelectorAll('[data-go]').forEach(b => b.onclick = () => go(b.dataset.go));
}
function go(v){ S.view = v; buildNav(); render(); window.scrollTo(0,0); }
$('goHome').onclick = () => { closeSheet(); go('today'); };

/* ---------------- sheet ---------------- */
function openSheet(title, html){
  $('sheetTitle').textContent = title; $('sheetBody').innerHTML = html;
  $('sheet').classList.add('on'); $('scrim').classList.add('on');
}
function closeSheet(){ $('sheet').classList.remove('on'); $('scrim').classList.remove('on'); }
$('sheetClose').onclick = closeSheet; $('scrim').onclick = closeSheet;

/* ---------------- data ---------------- */
async function load(agId){
  S.browseId = agId;
  S.fixtures = null; S.standings = null;
  render();
  const [fx, st] = await Promise.all([api.getFixtures(agId), api.getStandings(agId)]);
  S.fixtures = fx; S.standings = st;
  render();
}

/* ---------------- shared bits ---------------- */
function pills(){
  return `<div class="pill-row">${S.ageGroups.map(a =>
    `<button class="pill ${a.id===S.browseId?'on':''}" data-age="${a.id}">${esc(a.name)}</button>`).join('')}</div>`;
}
function comingSoon(what, agId){
  return `<div class="card"><div class="empty">
    <span class="cs-pill">Coming soon</span>
    <b>${what} not published yet</b>
    <div>The draw for ${esc(ageName(agId))} hasn’t been released. It will appear here as soon as the organisers publish it.</div>
  </div></div>`;
}
function matchRow(m, agId){
  const r = m.result, mine = isMine(m);
  const at = kickoffAt(m, agId || S.browseId);
  const soon = !r && at && (at.getTime() - Date.now()) < 45*60*1000 && (at.getTime() - Date.now()) > -75*60*1000;
  return `<button class="mrow ${mine?'mine':''}" data-match="${esc(m.id)}">
    <div><div class="mtime">${esc(m.time || '')}</div><div class="mpitch">${esc(m.pitch || 'TBD')}</div></div>
    <div><div class="mteams">${esc(m.home || 'TBD')} <span class="muted">v</span> ${esc(m.away || 'TBD')}</div>
      <div class="mmeta">${esc(m.poolName || m.round || '')}${soon ? `<span class="chip chip-next">${esc(untilText(at))}</span>` : ''}</div></div>
    <div>${r ? `<span class="mscore">${r.homeScore}&ndash;${r.awayScore}</span>` : ICON.chev}</div>
  </button>`;
}

/* ---------------- Today ---------------- */
function render(){
  paintRole();
  const m = $('main');
  m.innerHTML = S.view==='today' ? viewToday()
              : S.view==='fixtures' ? viewFixtures()
              : S.view==='tables' ? viewTables() : viewMore();
  wire();
}

function followCard(){
  const following = S.team || (S.ageId ? ageName(S.ageId) : null);
  if (!following) {
    return `<button class="tcard" data-act="follow" style="width:100%;text-align:left">
      <div class="tcard-k">Get started</div>
      <div class="tcard-n">Follow your team</div>
      <div class="tcard-m">Pick an age group and we’ll show you its fixtures, results and pool table first.</div>
    </button>`;
  }

  const fx = S.fixtures && S.browseId === S.ageId ? S.fixtures : null;
  const all = fx && !fx.awaitingPublication ? (fx.pool || []).concat(fx.knockout || []) : [];
  const mine = S.team ? all.filter(isMine) : all;
  const next = mine.find(m => !m.result);
  const last = [...mine].reverse().find(m => m.result);

  let inner = '';
  if (next) {
    const at = kickoffAt(next, S.ageId);
    const opp = S.team ? (next.home === S.team ? next.away : next.home) : `${next.home} v ${next.away}`;
    inner = `<div class="tcard-m" style="margin-top:12px">
        <strong style="color:#fff">${S.team ? 'v ' + esc(opp) : esc(opp)}</strong><br>
        ${esc(next.time || '')} &middot; ${esc(next.pitch || 'Pitch TBD')} &middot; ${esc(next.poolName || next.round || '')}
      </div>${at && untilText(at) ? `<div class="kick"><div style="flex:none;padding-left:14px;padding-right:14px"><b>${esc(untilText(at))}</b></div></div>` : ''}`;
  } else if (fx && fx.awaitingPublication) {
    inner = `<div class="tcard-m" style="margin-top:12px">Fixtures for this age group haven’t been published yet.</div>`;
  } else if (mine.length) {
    inner = `<div class="tcard-m" style="margin-top:12px">All matches played.</div>`;
  }

  const lastLine = last
    ? `<div class="tcard-m" style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.12)">
         Last: ${esc(last.home)} ${last.result.homeScore}&ndash;${last.result.awayScore} ${esc(last.away)}</div>` : '';

  return `<div class="tcard">
    <button class="tcard-cta" data-act="follow">Change</button>
    <div class="tcard-k">${S.team ? 'Following' : 'Following age group'}</div>
    <div class="tcard-n">${esc(following)}</div>
    ${S.team ? `<div class="tcard-m" style="margin-top:4px">${esc(ageName(S.ageId))}</div>` : ''}
    ${inner}${lastLine}
  </div>`;
}

function viewToday(){
  const p = phase();
  const diff = Math.max(0, KICKOFF.getTime() - Date.now());
  const d = Math.floor(diff/86400000), h = Math.floor(diff/3600000)%24,
        mi = Math.floor(diff/60000)%60, se = Math.floor(diff/1000)%60;

  let hero;
  if (p === 'before') {
    hero = `<div class="hero">
      <div class="hero-k">Sat 7 &amp; Sun 8 November 2026</div>
      <div class="hero-h">Two big days<br>of junior rugby</div>
      <div class="hero-p">Zayed Sports City, Abu Dhabi &middot; Gate 16</div>
      <div class="cd">
        <div><b>${d}</b><span>DAYS</span></div><div><b>${String(h).padStart(2,'0')}</b><span>HRS</span></div>
        <div><b>${String(mi).padStart(2,'0')}</b><span>MIN</span></div><div><b>${String(se).padStart(2,'0')}</b><span>SEC</span></div>
      </div></div>`;
  } else if (p === 'during') {
    const day = Date.now() < new Date(DAY2+'T00:00:00+04:00').getTime() ? 1 : 2;
    hero = `<div class="hero"><div class="hero-k">Live now &middot; day ${day}</div>
      <div class="hero-h">Match day</div>
      <div class="hero-p">Zayed Sports City &middot; Gate 16. Scores update as managers enter them.</div></div>`;
  } else {
    hero = `<div class="hero"><div class="hero-k">Tournament complete</div>
      <div class="hero-h">Thanks for<br>a great weekend</div>
      <div class="hero-p">Final tables and results are in the Tables tab.</div></div>`;
  }

  const practical = `<div class="sec-t">Before the day</div><div class="card">
      <div class="row"><div><b>Zayed Sports City</b><small>Enter via Gate 16 &middot; parking across the complex</small></div></div>
      <div class="row"><div><b>Pools kick off 8:00am</b><small>20-minute slots &mdash; two 7-minute halves</small></div></div>
      <div class="row"><div><b>Every player gets a medal</b><small>Bring boots, a mouthguard, water and sun cover</small></div></div>
    </div>
    <div class="sec-t">Registration</div><div class="card">
      <a class="row" href="/#register"><div><b>Enter a team or player</b><small>Registration is open on the tournament website</small></div>${ICON.chev}</a>
    </div>`;

  const fx = S.fixtures && S.browseId === S.ageId ? S.fixtures : null;
  const live = fx && !fx.awaitingPublication ? (fx.pool || []) : [];
  const mineList = S.team ? live.filter(isMine) : live;
  const upcoming = mineList.filter(m => !m.result).slice(0, 4);
  const recent = mineList.filter(m => m.result).slice(-3).reverse();

  const more = (upcoming.length ? `<div class="sec-t">${S.team ? 'Your fixtures' : 'Next up'}</div><div class="card">${upcoming.map(m=>matchRow(m,S.ageId)).join('')}</div>` : '')
             + (recent.length ? `<div class="sec-t">Recent results</div><div class="card">${recent.map(m=>matchRow(m,S.ageId)).join('')}</div>` : '');

  return hero + followCard() + (p === 'before' && !more ? practical : more + (p==='before' ? practical : ''));
}

/* ---------------- Fixtures ---------------- */
function viewFixtures(){
  const fx = S.fixtures;
  const head = `<div class="sec-t">Fixtures</div>${pills()}`;
  if (!fx) return head + `<div class="card"><div class="spin">Loading…</div></div>`;
  if (fx.awaitingPublication) return head + comingSoon('Fixtures', S.browseId);

  const showFilter = S.team && S.browseId === S.ageId;
  const seg = showFilter ? `<div class="seg">
      <button data-seg="mine" class="${S.onlyMine?'on':''}">${esc(S.team)}</button>
      <button data-seg="all" class="${!S.onlyMine?'on':''}">All matches</button>
    </div>` : '';

  let pool = fx.pool || [];
  if (showFilter && S.onlyMine) pool = pool.filter(isMine);

  /* Grouped by pool — twenty undifferentiated rows is hard to scan, and the
     pool is how people think about the draw. */
  const byPool = {};
  pool.forEach(m => { const k = m.poolName || 'Matches'; (byPool[k] = byPool[k] || []).push(m); });
  const groups = Object.keys(byPool).map(k =>
    `<div class="pool-h">${esc(k)}</div>${byPool[k].map(m=>matchRow(m,S.browseId)).join('')}`).join('');

  const ko = (fx.knockout || []).filter(k => k.home || k.away);
  return head + seg
    + `<div class="card">${groups || '<div class="empty"><b>No matches</b><div>Nothing scheduled here yet.</div></div>'}</div>`
    + (ko.length && !(showFilter && S.onlyMine) ? `<div class="sec-t">Knockout</div><div class="card">${ko.map(m=>matchRow(m,S.browseId)).join('')}</div>` : '');
}

/* ---------------- Tables ---------------- */
function viewTables(){
  const st = S.standings;
  const head = `<div class="sec-t">Tables</div>${pills()}`;
  if (!st) return head + `<div class="card"><div class="spin">Loading…</div></div>`;
  if (st.awaitingPublication) return head + comingSoon('Standings', S.browseId);
  if (!st.ageGroup.hasStandings) return head +
    `<div class="card"><div class="empty"><b>Festival age group</b>
     <div>${esc(st.ageGroup.name)} is non-competitive — no standings are kept.</div></div></div>`;

  const pools = st.pools || [];
  if (!pools.length) return head +
    `<div class="card"><div class="empty"><b>No pools yet</b><div>Nothing to show for this age group.</div></div></div>`;

  const adv = st._advance || 0;
  return head + pools.map(p => {
    const rows = st.tables[p.id] || [];
    return `<div class="sec-t">${esc(p.name)}</div><div class="card"><table>
      <thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>+/−</th><th>Pts</th></tr></thead>
      <tbody>${rows.map((t,i) => `<tr class="${i<adv?'q':''} ${t.team===S.team?'me':''}">
        <td>${i+1}</td><td>${esc(t.team)}</td><td>${t.P}</td><td>${t.W}</td><td>${t.D}</td><td>${t.L}</td>
        <td>${t.PF-t.PA>0?'+':''}${t.PF-t.PA}</td><td class="pts">${t.pts}</td></tr>`).join('')}</tbody></table>
      <div class="legend">Green bar = qualifies for the knockout stage. P played · W/D/L won, drawn, lost · +/− points difference · Pts league points.</div>
    </div>`;
  }).join('');
}

/* ---------------- More ---------------- */
function viewMore(){
  const s = S.session;
  return `<div class="sec-t">Venue</div><div class="card">
      <div class="row"><div><b>Zayed Sports City</b><small>Abu Dhabi &middot; enter via Gate 16</small></div></div>
      <div class="row"><div><b>Pitches A, B, C &amp; D</b><small>Follow the Quins signage from the Tennis Centre</small></div></div>
      <div class="row"><div><b>Sat 7 &amp; Sun 8 November 2026</b><small>Pools kick off 8:00am</small></div></div>
    </div>

    <div class="sec-t">Following</div><div class="card">
      <button class="row" data-act="follow"><div><b>${esc(S.team || (S.ageId ? ageName(S.ageId) : 'Not set'))}</b>
        <small>${S.team ? esc(ageName(S.ageId)) : 'Choose the team or age group you follow'}</small></div>${ICON.chev}</button>
    </div>

    <div class="sec-t">${s ? 'Your account' : 'Managers &amp; organisers'}</div><div class="card">
      ${s ? `<div class="row"><div><b>${esc(s.name || s.username)}</b>
          <small>${isOrganiser(s) ? 'Organiser — all age groups' : (s.ageGroupId==='*' ? 'Admin — all age groups' : ageName(s.ageGroupId))}</small></div></div>
        <button class="row" data-act="tools"><div><b>Full manager tools</b><small>Fixture editor, publishing, spirit award</small></div>${ICON.chev}</button>
        <button class="row" data-act="signout"><div><b>Sign out</b></div>${ICON.chev}</button>`
       : `<button class="row" data-act="signin"><div><b>Sign in</b><small>Enter scores for your age group</small></div>${ICON.chev}</button>`}
    </div>

    <div class="sec-t">More</div><div class="card">
      <a class="row" href="/"><div><b>Tournament website</b><small>About, registration, sponsors</small></div>${ICON.chev}</a>
      <a class="row" href="/scores"><div><b>Full scores page</b><small>Brackets and the complete standings view</small></div>${ICON.chev}</a>
    </div>
    <p class="muted" style="padding:18px 4px;font-size:12.5px;line-height:1.6">
      Abu Dhabi Harlequins Rugby Football Club &middot; founded 1970<br>Affiliated with Harlequin F.C. London</p>`;
}

/* ---------------- interactions ---------------- */
function wire(){
  document.querySelectorAll('[data-age]').forEach(b => b.onclick = () => load(b.dataset.age));
  document.querySelectorAll('[data-match]').forEach(b => b.onclick = () => openMatch(b.dataset.match));
  document.querySelectorAll('[data-act]').forEach(b => b.onclick = () => act(b.dataset.act));
  document.querySelectorAll('[data-seg]').forEach(b => b.onclick = () => { S.onlyMine = b.dataset.seg==='mine'; render(); });
}

function act(a){
  if (a === 'follow')  return openFollow();
  if (a === 'signin')  return signIn();
  if (a === 'signout') { api.logout(); try{orgApi.logout();}catch(e){} S.session=null; render(); toast('Signed out'); return; }
  if (a === 'tools')   { location.href = '/scores'; return; }
}

/* Two-stage: age group always, then narrow to a team once the draw exists. */
function openFollow(){
  const list = S.ageGroups.map(a =>
    `<button class="row" data-pick-age="${a.id}"><div><b>${esc(a.name)}</b>${a.id===S.ageId?'<small>Currently following</small>':''}</div>${ICON.chev}</button>`).join('');
  openSheet('Choose age group', `<div class="card">${list}</div>
    <p class="muted" style="margin-top:16px;font-size:13px;line-height:1.6">
      Once the draw is published you can narrow this to your own team, and the app will show your fixtures first.</p>`);
  document.querySelectorAll('[data-pick-age]').forEach(b => b.onclick = async () => {
    S.ageId = b.dataset.pickAge; S.team = null; saveFollow();
    closeSheet(); await load(S.ageId); openTeamPick();
  });
}

function openTeamPick(){
  const teams = teamsInAge();
  if (!teams.length) { toast('Following ' + ageName(S.ageId)); return; }
  openSheet('Choose your team', `<div class="card">
      ${teams.map(t => `<button class="row" data-pick-team="${esc(t)}"><div><b>${esc(t)}</b></div>${ICON.chev}</button>`).join('')}
      <button class="row" data-pick-team=""><div><b>All teams</b><small>Follow the whole age group</small></div>${ICON.chev}</button>
    </div>`);
  document.querySelectorAll('[data-pick-team]').forEach(b => b.onclick = () => {
    S.team = b.dataset.pickTeam || null; saveFollow(); closeSheet(); S.onlyMine = true; render();
    toast(S.team ? 'Following ' + S.team : 'Following ' + ageName(S.ageId));
  });
}

function signIn(){
  openSheet('Sign in', `<div id="loginErr"></div>
    <div class="field"><label>Username</label><input id="lu" autocomplete="username" autocapitalize="none"></div>
    <div class="field"><label>Password</label><input id="lp" type="password" autocomplete="current-password"></div>
    <button class="btn btn-p" id="lgo">Sign in</button>
    <p class="muted" style="margin-top:16px;font-size:13px;line-height:1.6">
      Managers use the account they created with their age group invite code.
      Organisers use their organiser account — both work here.</p>`);
  $('lgo').onclick = async () => {
    const u = $('lu').value.trim(), p = $('lp').value;
    if (!u || !p) { $('loginErr').innerHTML = '<div class="err">Enter your username and password.</div>'; return; }
    $('lgo').textContent = 'Signing in…';
    let r = await api.login(u, p);
    if (!r.ok) { const o = await orgApi.login(u, p); if (o.ok) r = o; }
    if (r.ok) {
      S.session = resolveSession(); closeSheet();
      const ag = S.session && S.session.ageGroupId;
      if (ag && ag !== '*' && S.ageGroups.some(a => a.id === ag)) await load(ag); else render();
      toast('Signed in');
    } else {
      $('loginErr').innerHTML = '<div class="err">Wrong username or password. Managers use their age group account; organisers use their organiser account.</div>';
      $('lgo').textContent = 'Sign in';
    }
  };
}

function findMatch(id){
  const fx = S.fixtures; if (!fx) return null;
  return (fx.pool || []).concat(fx.knockout || []).find(m => m.id === id) || null;
}

function openMatch(id){
  const m = findMatch(id); if (!m) return;
  const r = m.result, mayScore = canScore(S.session, S.browseId);
  const at = kickoffAt(m, S.browseId);

  const head = `<div class="card" style="margin-bottom:16px">
      <div class="row"><div><b>${esc(m.home||'TBD')} v ${esc(m.away||'TBD')}</b>
        <small>${esc(m.poolName||m.round||'')} &middot; ${esc(m.time||'')} &middot; ${esc(m.pitch||'Pitch TBD')}${at&&untilText(at)?' &middot; '+esc(untilText(at)):''}</small></div></div>
      ${r ? `<div class="row"><div><b style="font-family:'Anton';font-size:26px">${r.homeScore} &ndash; ${r.awayScore}</b>
        <small>Tries ${r.homeTries||0}&ndash;${r.awayTries||0}${r.walkover?' &middot; walk-over':''}</small></div></div>` : ''}
    </div>`;

  if (!mayScore) return openSheet('Match', head + (r ? '' :
    `<p class="muted" style="font-size:13.5px;line-height:1.6">No result yet. Scores appear here as soon as the age group manager enters them.</p>`));

  openSheet('Enter score', head + `<div id="scErr"></div>
    <div class="two">
      <div class="field"><label>${esc(m.home||'Home')} points</label><input id="hs" type="number" inputmode="numeric" min="0" value="${r?r.homeScore:''}"></div>
      <div class="field"><label>${esc(m.away||'Away')} points</label><input id="as" type="number" inputmode="numeric" min="0" value="${r?r.awayScore:''}"></div>
    </div>
    <div class="two">
      <div class="field"><label>Home tries</label><input id="ht" type="number" inputmode="numeric" min="0" value="${r?(r.homeTries||0):''}"></div>
      <div class="field"><label>Away tries</label><input id="at" type="number" inputmode="numeric" min="0" value="${r?(r.awayTries||0):''}"></div>
    </div>
    <div class="field"><label>Walk-over</label><select id="wo">
      <option value="">No walk-over</option>
      <option value="home" ${r&&r.walkover==='home'?'selected':''}>${esc(m.home||'Home')} awarded the match</option>
      <option value="away" ${r&&r.walkover==='away'?'selected':''}>${esc(m.away||'Away')} awarded the match</option>
    </select><p class="muted" style="font-size:12px;margin-top:6px">A walk-over is recorded as 20&ndash;0 with 4 tries.</p></div>
    <button class="btn btn-g" id="sgo">${r?'Update result':'Save result'}</button>`);

  $('sgo').onclick = async () => {
    const wo = $('wo').value;
    if (!wo && ($('hs').value==='' || $('as').value==='')) {
      $('scErr').innerHTML = '<div class="err">Enter both scores, or choose a walk-over.</div>'; return; }
    $('sgo').textContent = 'Saving…';
    const res = await api.submitResult(m.id, {
      homeScore:$('hs').value, awayScore:$('as').value,
      homeTries:$('ht').value, awayTries:$('at').value, walkover:wo||null }, S.session);
    if (res.ok) { closeSheet(); toast('Result saved'); await load(S.browseId); }
    else { $('scErr').innerHTML = `<div class="err">${esc(res.error||'Could not save.')}</div>`; $('sgo').textContent='Save result'; }
  };
}

/* ---------------- boot ---------------- */
(async function init(){
  S.session = resolveSession();
  S.ageGroups = (await api.getAgeGroups()).filter(a => a.hasStandings);
  loadFollow();

  const mgrAge = S.session && S.session.ageGroupId !== '*' ? S.session.ageGroupId : null;
  if (mgrAge && S.ageGroups.some(a => a.id === mgrAge)) S.ageId = mgrAge;
  if (!S.ageId || !S.ageGroups.some(a => a.id === S.ageId)) S.ageId = (S.ageGroups[0]||{}).id;

  buildNav();
  await load(S.ageId);

  // Countdown ticks; during the tournament also pull fresh scores.
  setInterval(() => { if (S.view === 'today') render(); }, 1000);
  setInterval(() => { if (phase() === 'during') load(S.browseId); }, 60000);
})();
</script>
</body>
</html>
